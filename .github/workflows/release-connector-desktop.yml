name: Release Connector Desktop MSI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Sync app versions from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = if ($tag.StartsWith("v")) { $tag.Substring(1) } else { $tag }

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Tag version must be semver like v1.2.3"
          }

          $assemblyVersion = "$version.0"

          [xml]$csproj = Get-Content "connector-desktop/Connector.Desktop/Connector.Desktop.csproj"
          $pg = $csproj.Project.PropertyGroup
          $pg.Version = $version
          $pg.FileVersion = $assemblyVersion
          $pg.AssemblyVersion = $assemblyVersion
          $csproj.Save("connector-desktop/Connector.Desktop/Connector.Desktop.csproj")

          $wxsPath = "connector-desktop/Connector.Desktop.Setup/Package.wxs"
          [xml]$wxs = Get-Content $wxsPath
          $packageNode = $wxs.Wix.Package
          if ($null -eq $packageNode) {
            throw "Cannot find <Package> node in $wxsPath"
          }
          $packageNode.Version = $version

          $settings = New-Object System.Xml.XmlWriterSettings
          $settings.Encoding = New-Object System.Text.UTF8Encoding($false)
          $settings.Indent = $true
          $settings.NewLineChars = "`n"
          $settings.NewLineHandling = [System.Xml.NewLineHandling]::Replace

          $writer = [System.Xml.XmlWriter]::Create($wxsPath, $settings)
          try {
            $wxs.Save($writer)
          }
          finally {
            $writer.Dispose()
          }

      - name: Build MSI
        shell: pwsh
        run: ./connector-desktop/build_msi.ps1

      - name: Verify MSI artifact
        shell: pwsh
        run: |
          $msi = "connector-desktop/artifacts/Connector.Desktop.Setup.msi"
          if (-not (Test-Path $msi)) {
            throw "MSI not found: $msi"
          }

      - name: Publish GitHub Release with MSI
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Structura Connector ${{ github.ref_name }}
          generate_release_notes: true
          files: connector-desktop/artifacts/Connector.Desktop.Setup.msi

      - name: Refresh server updates manifest cache
        shell: pwsh
        env:
          REFRESH_URL: ${{ secrets.CONNECTOR_UPDATES_REFRESH_URL }}
          ADMIN_KEY: ${{ secrets.CONNECTOR_ADMIN_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:REFRESH_URL) -or [string]::IsNullOrWhiteSpace($env:ADMIN_KEY)) {
            Write-Host "Refresh skipped: CONNECTOR_UPDATES_REFRESH_URL or CONNECTOR_ADMIN_API_KEY is not set"
            exit 0
          }

          $headers = @{
            "X-Admin-Key" = $env:ADMIN_KEY
            "X-Admin-Actor" = "github-release-bot"
          }
          $response = Invoke-RestMethod -Method POST -Uri $env:REFRESH_URL -Headers $headers -TimeoutSec 30
          if (-not $response.ok) {
            throw "Updates refresh endpoint returned non-ok response"
          }
          Write-Host "Server updates manifest refreshed to version $($response.manifest.version)"
