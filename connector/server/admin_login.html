<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Structura Connector - Вход администратора</title>
  <style>
    :root {
      --bg: #0b1016;
      --panel: #151d27;
      --stroke: #28364a;
      --text: #e8eef7;
      --muted: #9eb0c7;
      --accent: #5eead4;
      --error: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 600px at 80% -100px, #1e2e43, transparent), var(--bg);
      padding: 16px;
    }
    .card {
      width: min(440px, 100%);
      background: linear-gradient(180deg, var(--panel), #101822);
      border: 1px solid var(--stroke);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 8px; font-size: 24px; }
    .sub { margin: 0 0 14px; color: var(--muted); font-size: 13px; }
    label {
      display: block;
      margin: 10px 0 6px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    input {
      width: 100%;
      border: 1px solid var(--stroke);
      background: #0d141d;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%;
      margin-top: 14px;
      border: 1px solid #2a7c74;
      background: #113c39;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .error {
      margin-top: 10px;
      color: var(--error);
      font-size: 13px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <form class="card" method="post" action="/admin/login" autocomplete="on">
    <h1>Вход администратора</h1>
    <p class="sub">Structura Connector admin panel</p>

    <input type="hidden" name="next" value="__NEXT_URL__" />

    <label for="username">Логин</label>
    <input id="username" name="username" required autofocus placeholder="connector_admin" />

    <label for="password">Пароль</label>
    <input id="password" name="password" type="password" required placeholder="Пароль" />

    <button type="submit">Войти</button>
    <div class="error">__ERROR__</div>
  </form>
</body>
</html>
